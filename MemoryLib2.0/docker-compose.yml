services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: memoria-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: memoria
    ports:
      - "5432:5432"
    volumes:
      - memoria_pgdata:/var/lib/postgresql/data
      - ./server/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d memoria"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: memoria-redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: memoria-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - memoria_minio:/data

volumes:
  memoria_pgdata:
  memoria_minio:
